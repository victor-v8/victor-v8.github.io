<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Invitación</title>

  <style>

    body{
      margin:0;
      background:black;
      color:white;
      font-family:Arial;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    #pantallaLogin{
      text-align:center;
    }

    input{
      padding:15px;
      width:250px;
      border:none;
      border-radius:10px;
      font-size:18px;
    }

    button{
      padding:15px 25px;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      margin-top:10px;
    }

    #mensaje{
      margin-top:15px;
      color:red;
    }

    #videoinvitacion{
      display:none;
      width:100%;
      height:100%;
    }
    #videonoinvitacion{
      display:none;
      width:100%;
      height:100%;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
    }

  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="pantallaLogin">

    <h1>Ingresá tu nombre</h1>

    <input
      type="text"
      id="nombre"
      placeholder="Tu nombre"
    >

    <br>

    <button onclick="verificarInvitado()">
      Entrar
    </button>
  </div>

  <!-- VIDEO -->
  <div id="videoinvitacion">

    <video controls autoplay>

      <source src="hay-invitacion.mp4" type="video/mp4">

    </video>

  </div>
  <div id="videonoinvitacion">
        <video controls autoplay>
        <source src="no-hay-invitacion.mp4" type="video/mp4">
        </video>
    </div>

  <script>

    // LISTA DE INVITADOS
    const invitados = [
      "victor",
      "camila",
      "claudia",
      "celeste",
        "sofia",
        "malena",
        "mario",
        "oriana",
        "juana"
    ];

    // FUNCION
    function verificarInvitado(){

      // AGARRA EL TEXTO DEL INPUT
      const nombre = document
        .getElementById("nombre")
        .value
        .toLowerCase()
        .trim();

      // REVISA SI ESTA EN LA LISTA
      if(invitados.includes(nombre)){

        // OCULTA LOGIN
        document
          .getElementById("pantallaLogin")
          .style.display = "none";

        // MUESTRA VIDEO
        document
          .getElementById("videoinvitacion")
          .style.display = "block";

      }else{

        document
          .getElementById("pantallaLogin")
          .style.display = "none";

        // MENSAJE ERROR
        document
          .getElementById("videonoinvitacion")
          .style.display = ("block")

      }

    }

  </script>

</body>
</html>
